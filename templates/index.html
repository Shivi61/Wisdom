<!DOCTYPE html>

<html>

<head>

<title>Wisdom Trading</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>

body{

background:#0f172a;
color:white;
font-family:Arial;
margin:0;

}

.header{

padding:20px;
text-align:center;
background:#111827;
position:relative;
z-index:1000;

}

input{

padding:12px;
width:200px;
border:none;
border-radius:8px;

}

button{

padding:12px 18px;

background:#22c55e;

border:none;

color:white;

cursor:pointer;

border-radius:8px;

margin-left:10px;

font-weight:bold;

position:relative;

z-index:1000;

}

button:hover{

background:#16a34a;

}

#chart{

height:500px;

margin:20px;

}

#status{

padding:10px;

text-align:center;

color:#38bdf8;

}

</style>

</head>

<body>

<div class="header">

<h1>

Wisdom Trading Dashboard

</h1>

<input

id="stock"

placeholder="AAPL"

value="AAPL"

>

<button
id="loadBtn"
>

Load

</button>

</div>

<div id="status">

Waiting...

</div>

<div id="chart">

</div>

<script>

const chart=

LightweightCharts
.createChart(

document
.getElementById(
'chart'
),

{

width:

window.innerWidth-40,

height:500,

layout:{

background:{

color:"#0f172a"

},

textColor:"white"

}

}

)

const candle=

chart
.addSeries(

LightweightCharts
.CandlestickSeries

)

const socket=

new WebSocket(

"ws://127.0.0.1:8000/ws/trade/"

)

socket.onopen=()=>{

document
.getElementById(
"status"
)
.innerHTML=

"WebSocket Connected"

}

socket.onmessage=(event)=>{

const data=

JSON.parse(
event.data
)

if(data.candles){

candle.setData(
data.candles
)

document
.getElementById(
"status"
)
.innerHTML=

"Loaded"

}

}

socket.onerror=()=>{

document
.getElementById(
"status"
)
.innerHTML=

"Socket Error"

}

document
.getElementById(
"loadBtn"
)

.addEventListener(

"click",

()=>{

const stock=

document
.getElementById(
"stock"
)

.value

.toUpperCase()

document
.getElementById(
"status"
)

.innerHTML=

"Loading "+stock

socket.send(

JSON.stringify({

stock:stock

})

)

}

)

</script>

</body>

</html>
